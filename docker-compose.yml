
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: congress-postgres
    environment:
      POSTGRES_DB: congress
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      # This volume is for persistency and can be removed for a fresh start
      - postgres_data:/var/lib/postgresql/data
      # Mount the remote_data directory to make the dump file accessible
      - ./remote_data:/remote_data_mount
      # Init scripts: 00_load_dump.sh restores the latest dump, 01_pgvector.sql enables vector extension
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d congress"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
